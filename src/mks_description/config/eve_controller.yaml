controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

wheel_velocity_controller:
  ros__parameters:
    joints:
      - "front_left_wheel_to_leg"
      - "front_right_wheel_to_leg"
      - "back_left_wheel_to_leg"
      - "back_right_wheel_to_leg"
    min_velocity: -1.0
    max_velocity: 1.0